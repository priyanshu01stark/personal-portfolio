<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Page Not Found</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 500px;
      background: rgba(255,255,255,0.08);
      padding: 40px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 5rem;
      margin: 0;
    }
    p {
      font-size: 1.2rem;
      margin: 16px 0 28px;
    }
    a {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      background: white;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      background: #dbeafe;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Page Not Found</p>
    <a href="index.html">Go Home</a>
  </div>
</body>
</html>
